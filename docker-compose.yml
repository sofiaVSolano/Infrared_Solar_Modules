services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      # El modelo entrenado (.pth) no se copia a la imagen (es pesado y se
      # regenera corriendo el notebook) — se monta como volumen de solo lectura.
      - ./ModeloIA/modeloEntrenado:/workspace/ModeloIA/modeloEntrenado:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
